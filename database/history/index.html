<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tar1090 — history search &amp; replay</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; display: flex; flex-direction: column; font: 13px/1.4 system-ui, sans-serif; background: #14161a; color: #e6e6e6; }
  header { padding: 8px 12px 0; background: #1d2026; border-bottom: 1px solid #2c313a; }
  header h1 { margin: 0; font-size: 15px; font-weight: 600; }
  header span { color: #8a93a2; font-weight: 400; }
  #tabs { display: flex; gap: 2px; margin-top: 6px; }
  #tabs a { color: #9aa3b2; text-decoration: none; padding: 7px 14px; border-radius: 6px 6px 0 0; font-size: 13px; }
  #tabs a:hover { background: #23272f; color: #e6e6e6; }
  #tabs a.active { background: #2d6cdf; color: #fff; }
  #controls { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; background: #1a1d23; border-bottom: 1px solid #2c313a; align-items: center; }
  #controls input, #controls select { background: #0f1115; color: #e6e6e6; border: 1px solid #333; border-radius: 4px; padding: 5px 7px; font-size: 13px; }
  #controls input[type=text] { width: 116px; }
  #controls label { color: #8a93a2; font-size: 11px; display: flex; flex-direction: column; gap: 2px; }
  #controls button { background: #2d6cdf; color: #fff; border: 0; border-radius: 4px; padding: 7px 14px; cursor: pointer; font-size: 13px; }
  #controls button:hover { background: #3b78e8; }
  #controls button.ghost { background: #2a2f38; }
  #controls button.ghost:hover { background: #353c47; }
  #controls button.toggle.on { background: #2e9e6b; }
  #bell.armed { background: #caa23a; color: #1a1d23; font-weight: 600; }
  #presets { display: flex; gap: 4px; }
  #presets button { background: #21252c; color: #cdd5e0; padding: 6px 9px; font-size: 12px; }
  #presets button:hover { background: #2c333d; }
  #pager { display: flex; align-items: center; gap: 8px; padding: 5px 12px; background: #1a1d23; border-bottom: 1px solid #2c313a; }
  #pager label { color: #8a93a2; font-size: 11px; display: flex; align-items: center; gap: 4px; }
  #pager select { background: #0f1115; color: #e6e6e6; border: 1px solid #333; border-radius: 4px; padding: 4px 6px; font-size: 12px; }
  #pager button { background: #2a2f38; color: #e6e6e6; border: 0; border-radius: 4px; padding: 5px 10px; cursor: pointer; font-size: 12px; }
  #pager button:hover:not(:disabled) { background: #353c47; }
  #pager button:disabled { opacity: .45; cursor: default; }
  #pageinfo { color: #cdd5e0; font-size: 12px; font-variant-numeric: tabular-nums; }
  #main { flex: 1; min-height: 0; display: flex; }
  #left { flex: 0 0 46%; width: 46%; min-width: 260px; overflow: auto; }
  #dragbar { flex: 0 0 6px; background: #2c313a; cursor: col-resize; }
  #dragbar:hover, #dragbar.drag { background: #3b78e8; }
  #right { flex: 1 1 0; min-width: 200px; position: relative; }
  #map { position: absolute; inset: 0; background: #0b0d10; }
  /* Slight dark tint on the basemap only (mirrors the dimmed main tar1090 map) so the
     altitude-coloured trails stand out. Trails/markers live in the SVG overlay pane above
     the tiles, so only the basemap is dimmed -- the trails stay fully vivid. */
  .leaflet-tile-pane { filter: brightness(0.6) contrast(1.05) saturate(0.9); }
  .planeicon { background: transparent; border: 0; }
  table { width: auto; min-width: 100%; border-collapse: collapse; table-layout: fixed; }
  th, td { text-align: left; padding: 5px 8px; border-bottom: 1px solid #23262d; white-space: nowrap; }
  td { overflow: hidden; text-overflow: ellipsis; }
  th { position: sticky; top: 0; background: #1d2026; font-size: 11px; color: #9aa3b2; user-select: none; }
  th .thlbl { cursor: pointer; display: inline-block; overflow: hidden; text-overflow: ellipsis; max-width: calc(100% - 10px); vertical-align: bottom; }
  th .grip { position: absolute; top: 0; right: 0; width: 8px; height: 100%; cursor: col-resize; }
  th .grip:hover { background: #3b78e8; }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: #20242b; }
  tbody tr.sel { background: #243a5e; }
  th.swatch, td.swatch { width: 6px; padding: 0; }
  /* columns show/hide menu */
  #colmenu-wrap { position: relative; }
  #colbtn { background: #2a2f38; color: #e6e6e6; border: 1px solid #3a4150; border-radius: 4px; padding: 5px 10px; cursor: pointer; font-size: 12px; font-weight: 600; }
  #colbtn:hover { background: #2d6cdf; border-color: #2d6cdf; }
  #viewbtn { margin-left: auto; min-width: 132px; background: #2a2f38; color: #e6e6e6; border: 1px solid #3a4150; border-radius: 4px; padding: 5px 10px; cursor: pointer; font-size: 12px; font-weight: 600; }
  #viewbtn:hover { background: #353c47; }
  #colmenu { position: absolute; right: 0; top: 112%; z-index: 1000; background: #1d2026; border: 1px solid #2c313a;
             border-radius: 6px; padding: 6px; display: none; min-width: 150px; box-shadow: 0 6px 20px rgba(0,0,0,.5); }
  #colmenu.on { display: block; }
  #colmenu label { display: flex; align-items: center; gap: 6px; padding: 4px 6px; color: #cdd5e0; font-size: 12px; cursor: pointer; border-radius: 4px; }
  #colmenu label:hover { background: #262b33; }
  .mil { color: #ff6b6b; font-weight: 600; }
  .live { color: #2ec86b; font-weight: 600; font-size: 11px; white-space: nowrap; }
  #status { padding: 6px 12px; color: #9aa3b2; }
  #replay { position: absolute; left: 8px; right: 8px; bottom: 8px; z-index: 500; background: rgba(20,22,26,.92);
            border: 1px solid #2c313a; border-radius: 6px; padding: 6px 10px; display: none; align-items: center; gap: 8px; }
  #replay.on { display: flex; }
  #replay input[type=range] { flex: 1; }
  #replay button { background: #2d6cdf; color: #fff; border: 0; border-radius: 4px; padding: 4px 10px; cursor: pointer; }
  #ptlabel { color: #cbd3df; font-variant-numeric: tabular-nums; min-width: 210px; }
  #acphoto { position: absolute; top: 8px; right: 8px; z-index: 600; display: none;
             background: rgba(20,22,26,.92); border: 1px solid #2c313a; border-radius: 6px; padding: 3px; }
  #acphoto.on { display: block; }
  #acphoto img { display: block; max-width: 220px; max-height: 150px; border-radius: 4px; }
  #acphoto .cr { font-size: 10px; color: #8a93a2; padding: 2px 4px 0; text-align: right; }
  /* modern altitude colour legend (matches the Live map) */
  #legend { position: absolute; top: 78px; left: 10px; z-index: 600; background: rgba(20,23,28,.78);
            -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); border: 1px solid #313845;
            border-radius: 12px; padding: 9px 11px; box-shadow: 0 10px 30px rgba(0,0,0,.5); }
  #legend .lg-title { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #8a93a2; margin-bottom: 6px; text-align: center; }
  #legend .lg-body { display: flex; gap: 7px; height: 124px; }
  #legend .lg-bar { width: 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,.12); }
  #legend .lg-ticks { display: flex; flex-direction: column; justify-content: space-between; font-size: 10px;
                      color: #cdd5e0; font-variant-numeric: tabular-nums; }
  @media (max-width: 760px) {
    #main { flex-direction: column; }
    #left { width: 100% !important; flex-basis: auto !important; min-width: 0; max-height: 40vh; border-bottom: 1px solid #2c313a; }
    #dragbar { display: none; }
    #right { min-height: 50vh; }
    #controls button, #presets button { padding: 9px 12px; }
    #ptlabel { min-width: 0; }
    #legend { display: none; }
  }
</style>
</head>
<body>
<header>
  <h1>tar1090 — history search &amp; replay <span>· search the flight index, replay trails from globe_history</span></h1>
  <nav id="tabs"><a href="live.html">Live</a><a href="index.html" class="active">History</a><a href="alerts.html" class="admin-only">Alerts</a><a href="settings.html" class="admin-only">Settings</a></nav>
</header>

<div id="controls">
  <div id="presets">
    <button data-h="4">4h</button><button data-h="8">8h</button><button data-h="24">24h</button>
    <button data-h="168">7d</button><button data-h="720">30d</button><button data-h="8760">1y</button>
  </div>
  <label>Search<input id="q" type="text" placeholder="callsign / reg / type"></label>
  <label>Callsign<input id="callsign" type="text"></label>
  <label>Registration<input id="registration" type="text"></label>
  <label>Type<input id="type" type="text"></label>
  <label>Operator<input id="operator" type="text"></label>
  <label>Military<select id="mil"><option value="any">Any</option><option value="mil">Military</option><option value="civ">Civil</option></select></label>
  <label>From<input id="from" type="datetime-local"></label>
  <label>To<input id="to" type="datetime-local"></label>
  <button id="go">Search</button>
  <button id="clear" class="ghost">Clear</button>
  <button id="multi" class="toggle ghost" title="Mobile-friendly multi-select: when on, each tap adds/removes a flight">Multi</button>
  <button id="bell" class="ghost admin-only" title="Select one or more flights, then create alert rules">🔔 Alert</button>
</div>

<div id="pager">
  <label>Per page
    <select id="pagesize">
      <option value="100">100</option>
      <option value="500" selected>500</option>
      <option value="1000">1000</option>
      <option value="2000">2000</option>
    </select>
  </label>
  <button id="prev" disabled>‹ Prev</button>
  <span id="pageinfo"></span>
  <button id="next" disabled>Next ›</button>
  <button id="viewbtn" title="Switch the map between altitude-coloured trails and directional aircraft icons">〰 Altitude trails</button>
  <div id="colmenu-wrap">
    <button id="colbtn" title="Show / hide columns">Columns ▾</button>
    <div id="colmenu"></div>
  </div>
</div>

<div id="main">
  <div id="left">
    <div id="status">Pick a time range (or a preset) and search.</div>
    <table><thead><tr id="headrow"></tr></thead><tbody id="rows"></tbody></table>
  </div>
  <div id="dragbar" title="Drag to resize the list / map"></div>
  <div id="right">
    <div id="map"></div>
    <div id="legend">
      <div class="lg-title">Altitude</div>
      <div class="lg-body">
        <div class="lg-bar" id="lgbar"></div>
        <div class="lg-ticks"><span>40k+</span><span>30k</span><span>20k</span><span>10k</span><span>0 ft</span></div>
      </div>
    </div>
    <div id="acphoto"></div>
    <div id="replay">
      <button id="play">▶</button>
      <input id="slider" type="range" min="0" max="0" value="0">
      <span id="ptlabel"></span>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="acicons.js"></script>
<script>
const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2, '0');
function fmtUTC(ms){ if(ms==null) return ''; const d=new Date(ms);
  return d.getUTCFullYear()+'-'+pad(d.getUTCMonth()+1)+'-'+pad(d.getUTCDate())+' '+pad(d.getUTCHours())+':'+pad(d.getUTCMinutes())+':'+pad(d.getUTCSeconds())+'Z'; }
function fmtDur(s){ if(s==null) return ''; const h=Math.floor(s/3600), m=Math.floor(s%3600/60), ss=s%60;
  return (h?h+'h ':'')+(h||m?m+'m ':'')+ss+'s'; }
function toMs(v){ return v ? new Date(v).getTime() : ''; }
function localInput(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes()); }

// default range: last 24h
(function(){ const now=new Date(); $('to').value=localInput(now); $('from').value=localInput(new Date(now-864e5)); })();

const map = L.map('map', { worldCopyJump:true }).setView([40, -74], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { maxZoom: 18, attribution: '© OpenStreetMap' }).addTo(map);
let trailLayer = L.layerGroup().addTo(map);
let marker = null, pts = [], anim = null, markerCat = 'jet';
let iconMode = false;   // false = altitude trails, true = directional aircraft icons (no trails)

let flights = [], byId = new Map(), selected = new Set(), multiMode = false;
let sortKey = 'start', sortDir = -1, searchMsg = '';

// ---- columns: order, resize, show/hide (all persisted to localStorage) ------
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
// Order here IS the on-screen order. Operator is last (it's wide); the flight metrics
// (Start / Dur / Max alt) sit right after the identity columns.
const COLUMNS = [
  { key:'active',       label:'Live',        w:60,  sort:'active',       title:'Active = still being tracked (trail may be incomplete)',
    html:f=> f.active ? '<span class="live" title="Active – still recording; trail may be incomplete">● LIVE</span>' : '' },
  { key:'callsign',     label:'Callsign',    w:96,  sort:'callsign',     html:f=> esc(f.callsign) },
  { key:'registration', label:'Reg',         w:84,  sort:'registration', html:f=> esc(f.registration) },
  { key:'icao_type',    label:'Type',        w:64,  sort:'icao_type',    html:f=> esc(f.icao_type) },
  { key:'military',     label:'Mil',         w:50,  sort:'military',     html:f=> f.military ? '<span class="mil">MIL</span>' : '' },
  { key:'start',        label:'Start (UTC)', w:150, sort:'start',        html:f=> fmtUTC(f.start) },
  { key:'duration_s',   label:'Dur',         w:74,  sort:'duration_s',   html:f=> fmtDur(f.duration_s) },
  { key:'max_alt',      label:'Max alt',     w:78,  sort:'max_alt',      html:f=> f.max_alt!=null ? f.max_alt : '' },
  { key:'operator',     label:'Operator',    w:170, sort:'operator',     html:f=> esc(f.operator) },
];
let colW = {}, hiddenCols = new Set();
try { colW = JSON.parse(localStorage.getItem('histColW') || '{}') || {}; } catch(e){ colW = {}; }
try { hiddenCols = new Set(JSON.parse(localStorage.getItem('histHiddenCols') || '[]')); } catch(e){ hiddenCols = new Set(); }
const saveColW   = ()=>{ try{ localStorage.setItem('histColW', JSON.stringify(colW)); }catch(e){} };
const saveHidden = ()=>{ try{ localStorage.setItem('histHiddenCols', JSON.stringify([...hiddenCols])); }catch(e){} };

function applyColVis(){
  let el = document.getElementById('colhide');
  if (!el){ el = document.createElement('style'); el.id = 'colhide'; document.head.appendChild(el); }
  el.textContent = [...hiddenCols].map(k=>`.c_${k}{display:none}`).join('');
  document.querySelectorAll('#colmenu input').forEach(cb=> cb.checked = !hiddenCols.has(cb.dataset.key));
}

function buildHead(){
  const tr = document.getElementById('headrow');
  tr.innerHTML = '';
  const sw = document.createElement('th'); sw.className = 'swatch c_swatch'; tr.appendChild(sw);
  for (const c of COLUMNS){
    const th = document.createElement('th');
    th.className = 'c_' + c.key;
    th.style.width = (colW[c.key] || c.w) + 'px';
    if (c.title) th.title = c.title;
    const lbl = document.createElement('span'); lbl.className = 'thlbl'; lbl.textContent = c.label;
    lbl.onclick = ()=>{ sortDir = (sortKey === c.sort) ? -sortDir : 1; sortKey = c.sort; render(); };
    th.appendChild(lbl);
    const grip = document.createElement('span'); grip.className = 'grip';
    grip.addEventListener('mousedown', (e)=> startColResize(e, c.key, th));
    th.appendChild(grip);
    tr.appendChild(th);
  }
}

let colResize = null;
function startColResize(e, key, th){
  e.preventDefault(); e.stopPropagation();
  colResize = { key, th, x: e.clientX, w: th.getBoundingClientRect().width };
  document.body.style.cursor = 'col-resize';
  window.addEventListener('mousemove', onColResize);
  window.addEventListener('mouseup', endColResize);
}
function onColResize(e){
  if (!colResize) return;
  const w = Math.max(28, Math.round(colResize.w + (e.clientX - colResize.x)));
  colResize.th.style.width = w + 'px';
  colW[colResize.key] = w;
}
function endColResize(){
  if (!colResize) return;
  window.removeEventListener('mousemove', onColResize);
  window.removeEventListener('mouseup', endColResize);
  document.body.style.cursor = '';
  saveColW();
  colResize = null;
}

function buildColMenu(){
  const m = document.getElementById('colmenu'), btn = document.getElementById('colbtn');
  m.innerHTML = '';
  for (const c of COLUMNS){
    const lab = document.createElement('label');
    const cb = document.createElement('input'); cb.type = 'checkbox'; cb.dataset.key = c.key; cb.checked = !hiddenCols.has(c.key);
    cb.onchange = ()=>{ cb.checked ? hiddenCols.delete(c.key) : hiddenCols.add(c.key); saveHidden(); applyColVis(); };
    lab.appendChild(cb); lab.appendChild(document.createTextNode(' ' + c.label));
    m.appendChild(lab);
  }
  btn.onclick = (e)=>{ e.stopPropagation(); m.classList.toggle('on'); };
  document.addEventListener('click', (e)=>{ if (!m.contains(e.target) && e.target !== btn) m.classList.remove('on'); });
}

// ---- splitter: drag to resize the list vs. the map -------------------------
let split = null;
function initSplit(){
  const L = document.getElementById('left');
  const saved = localStorage.getItem('histLeftW');
  if (saved){ L.style.flex = '0 0 ' + saved; L.style.width = saved; }
  document.getElementById('dragbar').addEventListener('mousedown', (e)=>{
    e.preventDefault();
    split = { x: e.clientX, w: L.getBoundingClientRect().width };
    document.getElementById('dragbar').classList.add('drag');
    document.body.style.cursor = 'col-resize';
    window.addEventListener('mousemove', onSplit);
    window.addEventListener('mouseup', endSplit);
  });
}
function onSplit(e){
  if (!split) return;
  const main = document.getElementById('main').getBoundingClientRect();
  const w = Math.min(main.width - 210, Math.max(240, split.w + (e.clientX - split.x)));
  const L = document.getElementById('left');
  L.style.flex = '0 0 ' + w + 'px'; L.style.width = w + 'px';
  map.invalidateSize();
}
function endSplit(){
  if (!split) return;
  window.removeEventListener('mousemove', onSplit);
  window.removeEventListener('mouseup', endSplit);
  document.getElementById('dragbar').classList.remove('drag');
  document.body.style.cursor = '';
  const L = document.getElementById('left');
  localStorage.setItem('histLeftW', L.style.width || (L.getBoundingClientRect().width + 'px'));
  map.invalidateSize();
  split = null;
}
let pageOffset = 0, pageSize = 500, total = 0;
const MAX_DRAW = 300;   // mirrors the API's HISTORY_MAX_TRAILS

// Altitude -> colour, ported from the main tar1090 UI (ColorByAlt in defaults.js) so a
// single flight's trail gets the same smooth altitude gradient (orange low -> yellow ->
// green -> blue -> magenta high) instead of a few coarse steps. Returns an 'hsl()' string.
const _ALT_H = [ {alt:0,val:20},{alt:2000,val:32.5},{alt:4000,val:43},{alt:6000,val:54},
  {alt:8000,val:72},{alt:9000,val:85},{alt:11000,val:140},{alt:40000,val:300},{alt:51000,val:360} ];
const _ALT_L = [ {h:0,val:53},{h:20,val:50},{h:32,val:54},{h:40,val:52},{h:46,val:51},{h:50,val:46},
  {h:60,val:43},{h:80,val:41},{h:100,val:41},{h:120,val:41},{h:140,val:41},{h:160,val:40},
  {h:180,val:40},{h:190,val:44},{h:198,val:50},{h:200,val:58},{h:220,val:58},{h:240,val:58},
  {h:255,val:55},{h:266,val:55},{h:270,val:58},{h:280,val:58},{h:290,val:47},{h:300,val:43},
  {h:310,val:48},{h:320,val:48},{h:340,val:52},{h:360,val:53} ];
function altColor(altitude){
  if (altitude == null) return 'hsl(0,0%,75%)';                 // unknown
  if (altitude === 'ground' || altitude <= 0) return 'hsl(220,0%,35%)';  // on the ground
  // Band altitude exactly like the main UI's calcAltitudeRounded (125 ft below 8000 ft,
  // 500 ft at/above) so the trail draws in clean altitude bands and only changes colour
  // when the band changes -- without this it recolours at almost every point and looks noisy.
  const alt = altitude >= 8000 ? Math.round(altitude / 500) * 500 : Math.round(altitude / 125) * 125;
  let h = _ALT_H[0].val;
  for (let i = _ALT_H.length-1; i>=0; --i){
    if (alt > _ALT_H[i].alt){
      h = (i === _ALT_H.length-1) ? _ALT_H[i].val
        : _ALT_H[i].val + (_ALT_H[i+1].val - _ALT_H[i].val) * (alt - _ALT_H[i].alt)/(_ALT_H[i+1].alt - _ALT_H[i].alt);
      break;
    }
  }
  let l = _ALT_L[0].val;
  for (let i = _ALT_L.length-1; i>=0; --i){
    if (h > _ALT_L[i].h){
      l = (i === _ALT_L.length-1) ? _ALT_L[i].val
        : _ALT_L[i].val + (_ALT_L[i+1].val - _ALT_L[i].val) * (h - _ALT_L[i].h)/(_ALT_L[i+1].h - _ALT_L[i].h);
      break;
    }
  }
  h = ((h % 360) + 360) % 360;
  return `hsl(${h.toFixed(0)},88%,${l.toFixed(0)}%)`;
}
function hue(s){ let h=0; for (let i=0;i<s.length;i++) h=(h*31 + s.charCodeAt(i))>>>0; return 'hsl('+(h%360)+',70%,60%)'; }
function setStatus(extra){ $('status').textContent = searchMsg + (extra ? ' — ' + extra : ''); }

// Aircraft photo overlay (planespotters.net — same source as the main tar1090 UI).
const PS_API = 'https://api.planespotters.net/pub/photos/hex/';
let photoReq = 0;
function hidePhoto(){ const el=$('acphoto'); el.classList.remove('on'); el.innerHTML=''; }
async function showPhoto(f){
  hidePhoto();
  if (!f || !f.icao_hex || f.icao_hex[0] === '~') return;        // no photos for mlat/tisb hexes
  const my = ++photoReq;
  let url = PS_API + f.icao_hex.toUpperCase();
  const qs = [];
  if (f.registration) qs.push('reg=' + encodeURIComponent(f.registration));
  if (f.icao_type)    qs.push('icaoType=' + encodeURIComponent(f.icao_type));
  if (qs.length) url += '?' + qs.join('&');
  let j;
  try { const r = await fetch(url); if (!r.ok) return; j = await r.json(); }
  catch(e){ return; }                                           // network/CORS -> just show nothing
  if (my !== photoReq) return;                                  // a newer selection superseded this
  const ph = (j.photos || [])[0];
  const thumb = ph && ph.thumbnail;
  const src = thumb && (thumb.src || thumb);
  if (!src) return;
  const el = $('acphoto'); el.innerHTML = '';
  const img = document.createElement('img'); img.alt = '';
  img.onload  = ()=> { if (my === photoReq) el.classList.add('on'); };  // reveal only once it loads
  img.onerror = ()=> hidePhoto();                               // never leave a broken image
  if (ph.link && /^https?:\/\//.test(ph.link)){
    const a = document.createElement('a'); a.href = ph.link; a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.appendChild(img); el.appendChild(a);
  } else { el.appendChild(img); }
  if (ph.photographer){ const d = document.createElement('div'); d.className = 'cr'; d.textContent = '© ' + ph.photographer; el.appendChild(d); }
  img.src = src;
}

async function doSearch(keepPage){
  if (!keepPage) pageOffset = 0;       // a fresh search / new filters / new page size -> page 1
  pageSize = +$('pagesize').value || 500;
  const p = new URLSearchParams();
  for (const k of ['q','callsign','registration','type','operator','mil']) if ($(k).value) p.set(k, $(k).value);
  if ($('from').value) p.set('from', toMs($('from').value));
  if ($('to').value)   p.set('to',   toMs($('to').value));
  p.set('limit', pageSize); p.set('offset', pageOffset);
  searchMsg = 'Searching…'; setStatus();
  try {
    const r = await fetch('api/search?' + p.toString());
    const j = await r.json();
    if (j.error) { searchMsg = 'Error: ' + j.error; setStatus(); renderPager(); return; }
    flights = j.flights; selected.clear();
    total = (j.total != null) ? j.total : j.count;
    pageOffset = (j.offset != null) ? j.offset : pageOffset;
    const lo = total ? pageOffset + 1 : 0, hi = pageOffset + flights.length;
    searchMsg = `${lo}–${hi} of ${total} flight(s) · ${fmtUTC(j.from)} → ${fmtUTC(j.to)}`;
    render();
    renderMap();                       // nothing selected -> show this page's trails
    renderPager();
  } catch(e){ searchMsg = 'Request failed: ' + e; setStatus(); renderPager(); }
}

function renderPager(){
  const pages = Math.max(1, Math.ceil(total / pageSize));
  const cur = Math.floor(pageOffset / pageSize) + 1;
  $('pageinfo').textContent = total ? `Page ${cur} / ${pages}` : '';
  $('prev').disabled = pageOffset <= 0;
  $('next').disabled = pageOffset + pageSize >= total;
}

function render(){
  flights.sort((a,b)=>{ const x=a[sortKey], y=b[sortKey]; return (x<y?-1:x>y?1:0)*sortDir; });
  byId = new Map(flights.map(f=>[f.id, f]));
  const tb = $('rows'); tb.innerHTML='';
  for (const f of flights){
    const tr = document.createElement('tr');
    tr.dataset.id = f.id;
    const sw = f.military ? '#ff4d4d' : hue(f.icao_hex || String(f.id));
    let html = `<td class="swatch c_swatch" style="background:${sw}"></td>`;
    for (const c of COLUMNS) html += `<td class="c_${c.key}">${c.html(f)}</td>`;
    tr.innerHTML = html;
    if (selected.has(f.id)) tr.classList.add('sel');
    tr.onclick = (ev)=> onRow(f, ev);
    tb.appendChild(tr);
  }
}

function markRows(){ document.querySelectorAll('#rows tr').forEach(tr=>
  tr.classList.toggle('sel', selected.has(+tr.dataset.id))); }

function onRow(f, ev){
  const additive = multiMode || ev.ctrlKey || ev.metaKey || ev.shiftKey;
  if (additive){
    selected.has(f.id) ? selected.delete(f.id) : selected.add(f.id);
  } else if (selected.size === 1 && selected.has(f.id)){
    selected.clear();                  // click the only selection again -> back to "all"
  } else {
    selected.clear(); selected.add(f.id);
  }
  markRows(); renderMap();
}
function toggleId(id){ selected.has(id) ? selected.delete(id) : selected.add(id); markRows(); renderMap(); }

// ---- realistic type-shaped aircraft icons (tar1090's own marker set, via acicons.js) -------
// Shape is picked from the ICAO type, pointed along the trail's travel bearing (the trace has
// no heading field, so direction comes from movement between consecutive points).
function makePlaneIcon(type, color, deg, size, category){
  const r = aircraftShapeSVG(type, category, null, color, '#0b0d10', size || 30);
  const rot = r.noRotate ? 0 : (deg || 0);
  const html = `<div style="transform:rotate(${rot.toFixed(0)}deg);width:${r.w.toFixed(1)}px;height:${r.h.toFixed(1)}px;`
    + `filter:drop-shadow(0 1px 1.5px rgba(0,0,0,.7))">${r.svg}</div>`;
  return L.divIcon({ className:'planeicon', html, iconSize:[r.w, r.h], iconAnchor:[r.w/2, r.h/2] });
}
function bearingDeg(a, b){ // a,b = [lat,lon]
  const r = Math.PI/180, dLon = (b[1]-a[1])*r, la1 = a[0]*r, la2 = b[0]*r;
  const y = Math.sin(dLon)*Math.cos(la2);
  const x = Math.cos(la1)*Math.sin(la2) - Math.sin(la1)*Math.cos(la2)*Math.cos(dLon);
  return (Math.atan2(y, x)*180/Math.PI + 360) % 360;
}
function headingAt(i){
  if (pts.length < 2) return 0;
  const p0 = (i <= 0) ? pts[0] : pts[i-1];
  const p1 = (i <= 0) ? pts[1] : pts[i];
  return bearingDeg([p0[1], p0[2]], [p1[1], p1[2]]);
}

async function renderMap(){
  updateBell();
  stopAnim(); trailLayer.clearLayers(); $('replay').classList.remove('on'); hidePhoto();
  const ids = selected.size ? [...selected] : flights.map(f=>f.id);
  if (!ids.length){ setStatus('no flights'); return; }
  if (selected.size === 1) await drawSingle(byId.get(ids[0]));
  else                     await drawMany(ids, selected.size === 0);
}

// One aircraft: detailed altitude-coloured trail + replay scrubber.
async function drawSingle(f){
  if (!f) return;
  showPhoto(f);
  setStatus('loading trail…');
  let j;
  try { j = await (await fetch('api/trace?' + new URLSearchParams({ hex:f.icao_hex, start:f.start, end:f.end }))).json(); }
  catch(e){ setStatus('trail request failed: ' + e); return; }
  pts = j.points || [];
  if (!pts.length){ setStatus(`${f.callsign||f.icao_hex}: no trail on disk (aged out, or before globe-history was collected)`); return; }
  // A selected single flight always shows its trail (the icon/trail toggle only governs the
  // multi-flight overview), plus the replay marker.
  for (let i=1;i<pts.length;i++){
    const seg = L.polyline([[pts[i-1][1],pts[i-1][2]],[pts[i][1],pts[i][2]]],
      { color: altColor(pts[i][3]), weight: 3, opacity: .9 });
    seg.on('click', ()=> toggleId(f.id));
    seg.addTo(trailLayer);
  }
  // Rest the plane at the END of the trail (latest position) with the trail behind it, like the
  // Live map; pressing play replays from the start. Same altitude gradient as Live.
  markerCat = f.icao_type;
  const last = pts.length - 1;
  marker = L.marker([pts[last][1],pts[last][2]], { icon: makePlaneIcon(markerCat, altColor(pts[last][3]), headingAt(last)),
    interactive:false, zIndexOffset:1000, keyboard:false }).addTo(trailLayer);
  map.fitBounds(L.latLngBounds(pts.map(p=>[p[1],p[2]])).pad(0.1));
  const s=$('slider'); s.max=last; s.value=last; showPoint(last);
  $('replay').classList.add('on');
  const srcLabel = j.source==='heatmap' ? 'heatmap' : j.source==='live' ? 'live (in progress)' : 'full trace';
  setStatus(`${f.callsign||f.icao_hex}: ${pts.length} points · ${srcLabel} — play to replay; click the trail or its row to deselect`);
}

// Many aircraft (or "all in range"): one light line per flight, no scrubber.
async function drawMany(ids, isAll){
  const capped = ids.slice(0, MAX_DRAW);
  setStatus('loading trails…');
  let j;
  try { j = await (await fetch('api/traces?ids=' + capped.join(','))).json(); }
  catch(e){ setStatus('trail request failed: ' + e); return; }
  if (j.error){ setStatus('error: ' + j.error); return; }
  const fl = j.flights || {};
  let count = 0; const bounds = [];
  for (const id of capped){
    const tp = fl[id]; if (!tp || tp.length < 2) continue;
    const f = byId.get(id);
    const col = (f && f.military) ? '#ff4d4d' : hue((f && f.icao_hex) || String(id));
    const focus = ()=> { selected.clear(); selected.add(id); markRows(); renderMap(); };
    if (iconMode){
      // directional aircraft icon at the END of the trail (latest position), pointed along
      // travel -- matching the Live map (plane leads, trail behind); no line in this mode.
      const n = tp.length, a = tp[n-1], b = tp[n-2] || a;
      const m = L.marker([a[1], a[2]], { icon: makePlaneIcon(f.icao_type, col,
        bearingDeg([b[1],b[2]],[a[1],a[2]]), 22), interactive:true, keyboard:false });
      m.on('click', focus);
      m.addTo(trailLayer);
    } else {
      const line = L.polyline(tp.map(p=>[p[1],p[2]]), { color: col, weight: (f && f.military)?3:2, opacity: .72 });
      line.on('click', focus);
      line.addTo(trailLayer);
    }
    for (const p of tp) bounds.push([p[1],p[2]]);
    count++;
  }
  if (bounds.length) map.fitBounds(L.latLngBounds(bounds).pad(0.08));
  const more = (isAll && flights.length > capped.length) ? ` (first ${capped.length} of ${flights.length})` : '';
  // Trace-file trails are always returned; only the heatmap fallback can be truncated for a
  // very wide range, so we still draw what we have and just note that some were skipped.
  const trunc = j.truncated ? ` · some trails skipped (range too wide: ${j.chunks} > ${j.max_chunks} chunks) — narrow it to see the rest` : '';
  if (!count && j.truncated){
    setStatus(`time range too wide to draw these trails (${j.chunks} chunks > ${j.max_chunks}) — narrow the range/filters, or select specific flights`);
    return;
  }
  setStatus(`${count} trail(s) shown${more}${trunc} · ${isAll?'all in range':'selected'} — click a line or row to focus; Ctrl/⌘-click or Multi to add`);
}

function showPoint(i){
  const p = pts[i]; if(!p || !marker) return;
  marker.setLatLng([p[1],p[2]]);
  marker.setIcon(makePlaneIcon(markerCat, altColor(p[3]), headingAt(i)));
  $('ptlabel').textContent = `${fmtUTC(p[0])} · ${p[3]!=null?p[3]+' ft':'—'} · ${i+1}/${pts.length}`;
}
$('slider').oninput = e => showPoint(+e.target.value);

function stopAnim(){ if(anim){ clearInterval(anim); anim=null; $('play').textContent='▶'; } }
$('play').onclick = ()=>{
  if (anim){ stopAnim(); return; }
  if (+$('slider').value >= pts.length-1) $('slider').value = 0;
  $('play').textContent='❚❚';
  anim = setInterval(()=>{ let i=+$('slider').value+1; if(i>=pts.length){ stopAnim(); return; }
    $('slider').value=i; showPoint(i); }, 120);
};

// presets, search, clear, multi
document.querySelectorAll('#presets button').forEach(b=> b.onclick = ()=>{
  const now = new Date();
  $('to').value = localInput(now);
  $('from').value = localInput(new Date(now - (+b.dataset.h) * 3600e3));
  doSearch();
});
$('go').onclick = ()=> doSearch(false);
$('prev').onclick = ()=>{ if (pageOffset > 0){ pageOffset = Math.max(0, pageOffset - pageSize); doSearch(true); } };
$('next').onclick = ()=>{ if (pageOffset + pageSize < total){ pageOffset += pageSize; doSearch(true); } };
$('pagesize').onchange = ()=> doSearch(false);   // new page size -> back to page 1
$('clear').onclick = ()=>{
  selected.clear(); flights = []; byId.clear(); pts = [];
  ['q','callsign','registration','type','operator'].forEach(k=> $(k).value='');
  $('mil').value = 'any';
  $('rows').innerHTML=''; trailLayer.clearLayers(); stopAnim(); $('replay').classList.remove('on'); hidePhoto();
  $('bell').disabled = false; updateBell();
  total = 0; pageOffset = 0; renderPager();
  searchMsg = 'Cleared.'; setStatus('pick a time range or preset and search');
};
$('multi').onclick = ()=>{ multiMode = !multiMode; $('multi').classList.toggle('on', multiMode); };

// Bell: turn the current selection into alert rules, then hand off to the Alerts tab to refine.
async function postJSON(path, body){
  const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  return r.json();
}
function updateBell(){
  const b = $('bell'); if (!b) return;
  const n = selected.size;
  b.classList.toggle('armed', n>0);
  b.textContent = n>0 ? `🔔 Alert (${n})` : '🔔 Alert';
  b.title = n>0 ? `Create ${n} alert rule(s) from the selected flight(s)`
                : 'Select one or more flights, then create alert rules';
}
// Identify the airframe by registration; fall back to callsign, then type. (The alert engine
// has no per-hex condition, so registration is the most specific "this aircraft" match.)
function ruleFromFlight(f){
  const cond = {};
  if (f.registration)   cond.registration = f.registration;
  else if (f.callsign)  cond.callsign = f.callsign;
  else if (f.icao_type) cond.icao_type = f.icao_type;
  else return null;                                   // nothing matchable
  const name = [f.callsign, f.registration].filter(Boolean).join(' · ') || f.icao_type || f.icao_hex || 'aircraft';
  return { name, enabled:true, conditions:cond, zone:null, time_window:null, cooldown_sec:1800 };
}
$('bell').onclick = async ()=>{
  const sel = [...selected].map(id=>byId.get(id)).filter(Boolean);
  if (!sel.length){ setStatus('select one or more flights first, then click 🔔 to create alert rules'); return; }
  const bodies = sel.map(ruleFromFlight).filter(Boolean);
  if (!bodies.length){ setStatus('the selected flight(s) have no callsign / registration / type to alert on'); return; }
  $('bell').disabled = true; setStatus(`creating ${bodies.length} alert rule(s)…`);
  try {
    const ids = [];
    for (const body of bodies){            // sequential: the API serialises DB writes on one connection
      const res = await postJSON('api/alerts/rules', body);
      if (!res || !res.id) throw new Error((res && res.error) || 'save failed');
      ids.push(res.id);
    }
    location.href = ids.length === 1 ? `alerts.html?edit=${ids[0]}` : `alerts.html?new=${ids.join(',')}`;
  } catch(e){
    $('bell').disabled = false;
    setStatus('could not create alert(s): ' + (e.message || e) + ' — is the alerts database reachable?');
  }
};

document.querySelectorAll('#controls input').forEach(el=>el.addEventListener('keydown',e=>{ if(e.key==='Enter') doSearch(); }));

// Trail / no-trail toggle: trails (altitude-coloured lines) vs directional aircraft icons.
$('viewbtn').onclick = () => {
  iconMode = !iconMode;
  $('viewbtn').textContent = iconMode ? '✈ Aircraft icons' : '〰 Altitude trails';
  renderMap();
};

// build the table header / column menu, apply saved widths+visibility+split, then search
buildHead();
buildColMenu();
applyColVis();
initSplit();
// altitude legend bar, built straight from altColor() so it always matches the trails
(function buildLegend(){
  const max = 45000, steps = 30, stops = [];
  for (let i=0;i<=steps;i++){ const a = max*i/steps; stops.push(`${altColor(a)} ${(i/steps*100).toFixed(1)}%`); }
  $('lgbar').style.background = `linear-gradient(to top, ${stops.join(',')})`;
})();
doSearch();
</script>
<script src="auth.js"></script>
</body>
