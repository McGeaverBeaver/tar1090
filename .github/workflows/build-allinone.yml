name: Build tar1090-allinone container

# Builds the all-in-one image (tar1090 GUI + readsb + bundled tar1090-logger) and
# publishes it to GHCR. Postgres/Grafana are external; only the logger is added.
on:
  push:
    branches:
      - claude/great-darwin-ptphi2
      - master
    paths:
      - allinone/**
      - database/tar1090-logger.py
      - database/tar1090-history-api.py
      - database/tar1090-alerter.py
      - database/tar1090_mqtt.py
      - database/airshow_types.py
      - database/maneuver.py
      - database/patterns.py
      - database/survey_operators.py
      - database/gltf1to2.py
      - database/tar1090_heatmap_import.py
      - database/backfill_heatmap.py
      - database/backfill_globe_history.py
      - database/history/**
      - database/schema.sql
      - database/schema-index.sql
      - database/schema-alerts.sql
      - .github/workflows/build-allinone.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/tar1090-allinone" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./allinone/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
